<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>配信オーバーレイ（画像ボタン＆CSV対応版）</title>
  <style>
    body { font-family: sans-serif; background: #000; color: #fff; padding: 20px; }
    
    /* === 配信に映す部分 === */
    #overlay-display { border: 2px dashed #555; padding: 20px; min-height: 200px; margin-bottom: 50px; }
    .display-row { display: flex; align-items: center; margin-bottom: 15px; gap: 15px; }
    .display-row img { height: 60px; border-radius: 8px; }
    .display-row span { font-size: 40px; font-weight: bold; color: #00ff00; text-shadow: 2px 2px 4px #000; }

    /* === 操作パネル === */
    #control-panel { background: #333; padding: 20px; border-radius: 8px; max-width: 700px; }
    .form-group { background: #444; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
    .form-group input { font-size: 16px; padding: 8px; width: 100%; box-sizing: border-box; margin-bottom: 15px; }
    
    /* === 画像選択ボタンのデザイン === */
    #image-selector { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 15px; }
    .img-btn {
      background: #555; border: 3px solid transparent; border-radius: 8px; 
      cursor: pointer; padding: 5px; color: white; 
      display: flex; align-items: center; justify-content: center; 
      min-width: 80px; height: 60px; transition: 0.2s;
    }
    .img-btn img { max-height: 100%; border-radius: 4px; pointer-events: none; }
    /* 選択されているボタンは枠線を緑にして目立たせる */
    .img-btn.selected { border-color: #00ff00; background: #222; }

    .form-group button { font-size: 16px; padding: 10px 20px; cursor: pointer; font-weight: bold; }
    #saveBtn, #cancelBtn { display: none; }

    /* === リスト一覧部分 === */
    .control-row { display: flex; align-items: center; background: #222; padding: 10px; margin-bottom: 5px; border-radius: 4px; gap: 10px; }
    .control-row img { height: 40px; }
    .control-row .text-info { flex-grow: 1; font-size: 16px; }
    .control-row button { padding: 5px 10px; cursor: pointer; }
    .btn-edit { background: #ffc107; border: none; border-radius: 4px; }
    .btn-delete { background: #dc3545; color: white; border: none; border-radius: 4px; }
  </style>
</head>
<body>

  <div id="overlay-display">
    <div id="display-list"></div>
  </div>

  <div id="control-panel">
    <h3>📝 テロップ操作パネル</h3>
    
    <div class="form-group">
      <label>テキスト:</label>
      <input type="text" id="inputText" list="text-candidates" placeholder="表示したい文字を入力（または選択）">
      <datalist id="text-candidates"></datalist>
      
      <label>画像を選択:</label>
      <div id="image-selector">
        <button type="button" class="img-btn selected" data-url="">画像なし</button>
        <button type="button" class="img-btn" data-url="SSS+.png"><img src="SSS+.png" alt="SSS+"></button>
        <button type="button" class="img-btn" data-url="SSS.png"><img src="SSS.png" alt="SSS"></button>
        <button type="button" class="img-btn" data-url="SS+.png"><img src="SS+.png" alt="SS+"></button>
        <button type="button" class="img-btn" data-url="SS+.png"><img src="SS.png" alt="SS"></button>
      </div>

      <div>
        <button id="addBtn" style="background:#28a745; color:white; border:none; border-radius:4px;">＋ 新しく追加</button>
        <button id="saveBtn" style="background:#007bff; color:white; border:none; border-radius:4px;">💾 上書き保存</button>
        <button id="cancelBtn" style="background:#6c757d; color:white; border:none; border-radius:4px;">キャンセル</button>
      </div>
    </div>

    <h4>現在の表示リスト</h4>
    <div id="control-list"></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue, push, remove, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // ▼▼▼ ここを自分の設定に書き換える ▼▼▼
    const firebaseConfig = {
      apiKey: "AIzaSy...",
      authDomain: "your-project.firebaseapp.com",
      databaseURL: "https://your-project-default-rtdb.firebaseio.com",
      projectId: "your-project",
      // ...他も忘れずに
    };
    // ▲▲▲ ここまで ▲▲▲

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const listRef = ref(db, 'live/items');

    let currentEditId = null; 
    let currentSelectedImage = ""; // ★現在選択されている画像のURLを記憶する変数

    // ------------------------------------------
    // 【CSV読み込み機能】
    // ------------------------------------------
    async function loadCandidatesFromCSV() {
      try {
        const response = await fetch('musiclist.csv');
        if (!response.ok) return; // CSVが無くてもエラーで止めない
        const csvText = await response.text();
        const datalist = document.getElementById('text-candidates');
        datalist.innerHTML = '';
        
        const lines = csvText.split(/\r\n|\n/).filter(line => line.trim() !== '');
        lines.forEach(line => {
          const text = line.split(',')[0].trim();
          if (text) {
            const option = document.createElement('option');
            option.value = text;
            datalist.appendChild(option);
          }
        });
      } catch (error) {
        console.error("CSV読み込みエラー:", error);
      }
    }
    loadCandidatesFromCSV();

    // ------------------------------------------
    // ★【画像ボタン選択機能】
    // ------------------------------------------
    document.querySelectorAll('.img-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        // 全てのボタンから緑枠(selected)を外す
        document.querySelectorAll('.img-btn').forEach(b => b.classList.remove('selected'));
        
        // クリックされたボタンに緑枠をつける
        const clickedBtn = e.currentTarget;
        clickedBtn.classList.add('selected');
        
        // 選択された画像のURLを変数に保存する
        currentSelectedImage = clickedBtn.getAttribute('data-url');
      });
    });

    // ------------------------------------------
    // 【受信・表示】画面を描き直す
    // ------------------------------------------
    onValue(listRef, (snapshot) => {
      const data = snapshot.val();
      const displayList = document.getElementById('display-list');
      const controlList = document.getElementById('control-list');
      
      displayList.innerHTML = '';
      controlList.innerHTML = '';

      if (!data) return;

      Object.keys(data).forEach(key => {
        const item = data[key];

        // 配信画面用（テキスト → 画像の順）
        const dispDiv = document.createElement('div');
        dispDiv.className = 'display-row';
        dispDiv.innerHTML = `
          <span>${item.text}</span>
          ${item.imageUrl ? `<img src="${item.imageUrl}">` : ''}
        `;
        displayList.appendChild(dispDiv);

        // 操作パネル用
        const ctrlDiv = document.createElement('div');
        ctrlDiv.className = 'control-row';
        ctrlDiv.innerHTML = `
          <div class="text-info">${item.text}</div>
          ${item.imageUrl ? `<img src="${item.imageUrl}">` : '<div style="width:40px;"></div>'}
          <button class="btn-edit" onclick="startEdit('${key}', '${item.text}', '${item.imageUrl}')">編集</button>
          <button class="btn-delete" onclick="deleteItem('${key}')">削除</button>
        `;
        controlList.appendChild(ctrlDiv);
      });
    });

    // ------------------------------------------
    // 【操作機能】追加・削除・編集
    // ------------------------------------------
    
    // 【追加】
    document.getElementById('addBtn').addEventListener('click', () => {
      const textVal = document.getElementById('inputText').value;
      if (!textVal && !currentSelectedImage) return;

      // 変数 currentSelectedImage に入っているURLを送信する
      push(listRef, { text: textVal, imageUrl: currentSelectedImage });
      clearForm();
    });

    // 【削除】
    window.deleteItem = (id) => {
      if(confirm('この行を削除しますか？')) {
        remove(ref(db, `live/items/${id}`));
      }
    };

    // 【編集準備】★画像ボタンの選択状態も復元する
    window.startEdit = (id, currentText, currentImage) => {
      currentEditId = id;
      document.getElementById('inputText').value = currentText;
      
      currentSelectedImage = currentImage || "";
      
      // 一旦すべてのボタンの選択を解除
      document.querySelectorAll('.img-btn').forEach(b => b.classList.remove('selected'));
      
      // データと同じURLを持つボタンがあれば選択状態にする、無ければ「画像なし」を選択
      const targetBtn = document.querySelector(`.img-btn[data-url="${currentSelectedImage}"]`);
      if (targetBtn) {
        targetBtn.classList.add('selected');
      } else {
        document.querySelector('.img-btn[data-url=""]').classList.add('selected');
      }

      document.getElementById('addBtn').style.display = 'none';
      document.getElementById('saveBtn').style.display = 'inline-block';
      document.getElementById('cancelBtn').style.display = 'inline-block';
    };

    // 【編集保存】
    document.getElementById('saveBtn').addEventListener('click', () => {
      const textVal = document.getElementById('inputText').value;
      update(ref(db, `live/items/${currentEditId}`), { text: textVal, imageUrl: currentSelectedImage });
      clearForm();
    });

    // 【キャンセル】
    document.getElementById('cancelBtn').addEventListener('click', clearForm);

    // ★フォームと画像選択状態をリセットする関数
    function clearForm() {
      currentEditId = null;
      document.getElementById('inputText').value = '';
      
      // 画像選択を「画像なし」に戻す
      currentSelectedImage = "";
      document.querySelectorAll('.img-btn').forEach(b => b.classList.remove('selected'));
      document.querySelector('.img-btn[data-url=""]').classList.add('selected');

      document.getElementById('addBtn').style.display = 'inline-block';
      document.getElementById('saveBtn').style.display = 'none';
      document.getElementById('cancelBtn').style.display = 'none';
    }
  </script>

</body>
</html>
