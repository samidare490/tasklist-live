<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>配信テロップ画面</title>
  <style>
    /* 画面全体のデザイン */
    body { font-family: sans-serif; background: #000; color: #000; padding: 20px; }
    /* 配信に映す文字のデザイン */
    #overlay-text { font-size: 60px; font-weight: bold; color: #eeeeee; text-shadow: 2px 2px 4px #000; }
    /* 操作パネルのデザイン */
    #control-panel { background: #333; padding: 20px; margin-top: 80px; border-radius: 8px; display: inline-block; }
    input { font-size: 20px; padding: 8px; width: 300px; }
    button { font-size: 20px; padding: 8px 16px; cursor: pointer; }
  </style>
</head>
<body>

  <div id="overlay-text">待機中...</div>

  <div id="control-panel">
    <h3>テロップ操作パネル</h3>
    <input type="text" id="inputText" placeholder="表示したい文字を入力">
    <button id="updateBtn">更新</button>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // ▼▼▼ ここを自分の設定に書き換える ▼▼▼
    const firebaseConfig = {
      apiKey: "AIzaSyCm7JSHoVaJQRz4UaDTFeRoeVlAkOYpql0",
      authDomain: "tasklist-live.firebaseapp.com",
      databaseURL: "https://tasklist-live-default-rtdb.firebaseio.com",
      projectId: "tasklist-live",
      storageBucket: "tasklist-live.firebasestorage.app",
      messagingSenderId: "687728987860",
      appId: "1:687728987860:web:8b19ac1aea6c7f2d3bb541",
      measurementId: "G-53D8MHL743"
    };
    // ▲▲▲ ここまで ▲▲▲

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const textRef = ref(db, 'live/message');

    // 【受信】データベースが変わったら文字を書き換える
    onValue(textRef, (snapshot) => {
      document.getElementById('overlay-text').innerText = snapshot.val() || "テキストなし";
    });

    // 【送信】ボタンを押したら入力された文字をデータベースに送る
    document.getElementById('updateBtn').addEventListener('click', () => {
      const newText = document.getElementById('inputText').value;
      set(textRef, newText);
    });
  </script>

</body>
</html>
